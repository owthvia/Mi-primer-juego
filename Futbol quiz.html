<!DOCTYPE html>
<html>
<head>
  <title>Kahoot Fútbol PRO ⚽</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b6623, #1e90ff);
      color: white;
      text-align: center;
    }

    .tarjeta {
      margin-top: 40px;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      width: 320px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: white;
      color: black;
      transition: 0.3s;
    }

    .correcta {
      background: green !important;
      color: white;
    }

    .incorrecta {
      background: red !important;
      color: white;
    }

    #ranking {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>⚽ Kahoot PRO Jugadores</h1>
<div id="juego"></div>
<div id="ranking"></div>

<script>
let jugador = "";
let puntos = 0;
let preguntaActual = 0;
let tiempo = 10;
let intervalo;

let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

const preguntas = [
  {
    p: "¿Quién es este jugador?",
    img: "https://upload.wikimedia.org/wikipedia/commons/8/89/Leo_Messi_20180626.jpg",
    opciones: ["Messi", "Di María", "Suárez", "Agüero"],
    correcta: "Messi"
  },
  {
    p: "¿Quién es este jugador?",
    img: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg",
    opciones: ["Ronaldo", "Benzema", "Bale", "Modric"],
    correcta: "Ronaldo"
  },
  {
    p: "¿Quién es este jugador?",
    img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Neymar_2018.jpg",
    opciones: ["Vinicius", "Neymar", "Rodrygo", "Firmino"],
    correcta: "Neymar"
  },

  // 👉 DUPLICA Y CAMBIA PARA LLEGAR A 25
];

// 👉 DUPLICADOR AUTOMÁTICO para llegar a 25 preguntas
while (preguntas.length < 25) {
  preguntas.push(preguntas[preguntas.length % 3]);
}

function iniciar() {
  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>Nombre</h2>
      <input id="nombre">
      <button onclick="empezar()">Jugar</button>
    </div>
  `;
  mostrarRanking();
}

function empezar() {
  jugador = document.getElementById("nombre").value;
  if (!jugador) return alert("Escribe tu nombre");

  puntos = 0;
  preguntaActual = 0;
  siguientePregunta();
}

function siguientePregunta() {
  if (preguntaActual >= 25) {
    terminar();
    return;
  }

  tiempo = 10;
  const pregunta = preguntas[preguntaActual];

  let botones = "";
  pregunta.opciones.forEach(op => {
    botones += `<button onclick="responder(this, '${op}')">${op}</button>`;
  });

  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h3>${jugador} | ${puntos} pts</h3>
      <p>${pregunta.p}</p>
      <img src="${pregunta.img}">
      ${botones}
      <p id="tiempo">⏱️ ${tiempo}</p>
    </div>
  `;

  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").innerText = "⏱️ " + tiempo;

    if (tiempo <= 0) {
      clearInterval(intervalo);
      siguiente();
    }
  }, 1000);
}

function responder(boton, respuesta) {
  clearInterval(intervalo);

  const correcta = preguntas[preguntaActual].correcta;
  const botones = document.querySelectorAll("button");

  botones.forEach(b => {
    if (b.innerText === correcta) {
      b.classList.add("correcta");
    }
  });

  if (respuesta === correcta) {
    boton.classList.add("correcta");
    puntos++;
  } else {
    boton.classList.add("incorrecta");
  }

  setTimeout(siguiente, 1500);
}

function siguiente() {
  preguntaActual++;
  siguientePregunta();
}

function terminar() {
  ranking.push({ nombre: jugador, puntos });
  localStorage.setItem("ranking", JSON.stringify(ranking));

  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>Fin</h2>
      <p>${jugador}: ${puntos} puntos</p>
      <button onclick="iniciar()">Reiniciar</button>
    </div>
  `;

  mostrarRanking();
}

function mostrarRanking() {
  let html = "<h2>🏆 Ranking</h2>";

  ranking
    .sort((a, b) => b.puntos - a.puntos)
    .slice(0, 5)
    .forEach(j => {
      html += `<p>${j.nombre}: ${j.puntos}</p>`;
    });

  document.getElementById("ranking").innerHTML = html;
}

iniciar();
</script>

</body>
</html>
