<!DOCTYPE html>
<html>
<head>
  <title>Kahoot Jugadores ⚽</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0b6623, #1e90ff);
      color: white;
      text-align: center;
    }

    .tarjeta {
      margin-top: 40px;
      background: rgba(0,0,0,0.7);
      padding: 25px;
      border-radius: 20px;
      width: 320px;
      display: inline-block;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .correcta { background: green; color: white; }
    .incorrecta { background: red; color: white; }
  </style>
</head>
<body>

<h1>⚽ Quiz Jugadores</h1>
<div id="juego"></div>

<script>
let jugador = "";
let puntos = 0;
let actual = 0;

const preguntas = [
{img:"https://img.a.transfermarkt.technology/portrait/big/455498.jpg", opciones:["Maignan","Donnarumma","Lloris","Oblak"], correcta:"Maignan"},
{img:"https://img.a.transfermarkt.technology/portrait/big/37666.jpg", opciones:["Vidal","Sánchez","Medel","Pulgar"], correcta:"Vidal"},
{img:"https://img.a.transfermarkt.technology/portrait/big/91845.jpg", opciones:["Son","Kang-in","Min-jae","Hwang"], correcta:"Son"},
{img:"https://img.a.transfermarkt.technology/portrait/big/88755.jpg", opciones:["De Bruyne","Modric","Kroos","Foden"], correcta:"De Bruyne"},
{img:"https://img.a.transfermarkt.technology/portrait/big/96341.jpg", opciones:["Lukaku","Martínez","Dzeko","Abraham"], correcta:"Lukaku"},
{img:"https://img.a.transfermarkt.technology/portrait/big/241641.jpg", opciones:["Bernardo","Bruno","Neves","Felix"], correcta:"Bernardo"},
{img:"https://img.a.transfermarkt.technology/portrait/big/369081.jpg", opciones:["Valverde","Camavinga","Tchouameni","Ceballos"], correcta:"Valverde"},
{img:"https://img.a.transfermarkt.technology/portrait/big/40433.jpg", opciones:["Alexis","Vidal","Isla","Bravo"], correcta:"Alexis"},
{img:"https://img.a.transfermarkt.technology/portrait/big/288230.jpg", opciones:["Dembélé","Mbappé","Coman","Griezmann"], correcta:"Dembélé"},
{img:"https://img.a.transfermarkt.technology/portrait/big/622208.jpg", opciones:["Bryan Gil","Sarabia","Oyarzabal","Fati"], correcta:"Bryan Gil"},
{img:"https://img.a.transfermarkt.technology/portrait/big/362970.jpg", opciones:["Lo Celso","Paredes","Enzo","De Paul"], correcta:"Lo Celso"},
{img:"https://img.a.transfermarkt.technology/portrait/big/198291.jpg", opciones:["Davinson","Mina","Murillo","Cuesta"], correcta:"Davinson"},
{img:"https://img.a.transfermarkt.technology/portrait/big/576024.jpg", opciones:["Julián","Di María","Dybala","Icardi"], correcta:"Julián"},
{img:"https://img.a.transfermarkt.technology/portrait/big/412363.jpg", opciones:["Rodrygo","Vinicius","Militao","Endrick"], correcta:"Rodrygo"},
{img:"https://img.a.transfermarkt.technology/portrait/big/371998.jpg", opciones:["Vinicius","Rodrygo","Raphinha","Neymar"], correcta:"Vinicius"},
{img:"https://img.a.transfermarkt.technology/portrait/big/683840.jpg", opciones:["Pedri","Gavi","Fermin","Olmo"], correcta:"Pedri"},
{img:"https://img.a.transfermarkt.technology/portrait/big/646740.jpg", opciones:["Gavi","Pedri","Fati","Yamal"], correcta:"Gavi"},
{img:"https://img.a.transfermarkt.technology/portrait/big/326031.jpg", opciones:["De Jong","De Ligt","Van Dijk","Blind"], correcta:"De Jong"},
{img:"https://img.a.transfermarkt.technology/portrait/big/398073.jpg", opciones:["Hakimi","Mazraoui","Ziyech","Amrabat"], correcta:"Hakimi"},
{img:"https://img.a.transfermarkt.technology/portrait/big/424204.jpg", opciones:["Davies","David","Buchanan","Larin"], correcta:"Davies"},
{img:"https://img.a.transfermarkt.technology/portrait/big/581678.jpg", opciones:["Bellingham","Rice","Mount","Foden"], correcta:"Bellingham"},
{img:"https://img.a.transfermarkt.technology/portrait/big/580195.jpg", opciones:["Musiala","Wirtz","Havertz","Sane"], correcta:"Musiala"},
{img:"https://img.a.transfermarkt.technology/portrait/big/406625.jpg", opciones:["Lautaro","Dybala","Correa","Alvarez"], correcta:"Lautaro"},
{img:"https://img.a.transfermarkt.technology/portrait/big/357164.jpg", opciones:["Leao","Felix","Silva","Ramos"], correcta:"Leao"},
{img:"https://img.a.transfermarkt.technology/portrait/big/401923.jpg", opciones:["Osimhen","Lookman","Chukwueze","Iheanacho"], correcta:"Osimhen"}
];

function iniciar(){
  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>Nombre</h2>
      <input id="nombre">
      <button onclick="empezar()">Jugar</button>
    </div>`;
}

function empezar(){
  jugador = document.getElementById("nombre").value;
  puntos = 0;
  actual = 0;
  mostrar();
}

function mostrar(){
  if(actual >= preguntas.length){
    document.getElementById("juego").innerHTML = `
      <div class="tarjeta">
        <h2>Final</h2>
        <p>${jugador}: ${puntos}/25</p>
        <button onclick="iniciar()">Reiniciar</button>
      </div>`;
    return;
  }

  const p = preguntas[actual];

  let botones = "";
  p.opciones.forEach(op=>{
    botones += `<button onclick="responder(this,'${op}')">${op}</button>`;
  });

  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h3>${jugador} | ${puntos}</h3>
      <img src="${p.img}">
      ${botones}
    </div>`;
}

function responder(btn,res){
  const correcta = preguntas[actual].correcta;
  const botones = document.querySelectorAll("button");

  botones.forEach(b=>{
    if(b.innerText===correcta) b.classList.add("correcta");
  });

  if(res===correcta){
    puntos++;
    btn.classList.add("correcta");
  } else {
    btn.classList.add("incorrecta");
  }

  setTimeout(()=>{
    actual++;
    mostrar();
  },1000);
}

iniciar();
</script>

</body>
</html>
