<!DOCTYPE html>
<html>
<head>
  <title>Kahoot Fútbol ⚽</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b6623, #1e90ff);
      color: white;
      text-align: center;
    }

    .tarjeta {
      margin-top: 50px;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
    }

    img {
      width: 300px;
      border-radius: 15px;
      margin: 20px 0;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 200px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: black;
    }

    button:hover {
      background: yellow;
    }

    #temporizador {
      font-size: 20px;
      color: yellow;
    }
  </style>
</head>
<body>

<h1>⚽ Kahoot de Fútbol</h1>
<div id="juego"></div>

<script>
let jugador = "";
let puntos = 0;
let preguntaActual = 0;
let tiempo = 10;
let intervalo;

const preguntas = [
  {
    p: "¿Quién es este jugador?",
    img: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg",
    opciones: ["Messi", "Cristiano Ronaldo", "Neymar", "Mbappé"],
    correcta: "Cristiano Ronaldo"
  },
  {
    p: "¿Qué equipo es este?",
    img: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg",
    opciones: ["Barcelona", "Real Madrid", "PSG", "Juventus"],
    correcta: "Real Madrid"
  },
  {
    p: "¿Quién es este jugador?",
    img: "https://upload.wikimedia.org/wikipedia/commons/8/89/Leo_Messi_20180626.jpg",
    opciones: ["Messi", "Suárez", "Ronaldo", "Neymar"],
    correcta: "Messi"
  }
];

function iniciar() {
  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>Escribe tu nombre</h2>
      <input id="nombre">
      <br>
      <button onclick="empezar()">Jugar</button>
    </div>
  `;
}

function empezar() {
  jugador = document.getElementById("nombre").value;
  if (!jugador) return alert("Escribe tu nombre");

  puntos = 0;
  preguntaActual = 0;
  mostrarPregunta();
}

function mostrarPregunta() {
  if (preguntaActual >= preguntas.length) {
    terminar();
    return;
  }

  const pregunta = preguntas[preguntaActual];

  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>${pregunta.p}</h2>
      <img src="${pregunta.img}">
      <p>⏳ Preparando respuestas...</p>
    </div>
  `;

  setTimeout(mostrarRespuestas, 2000);
}

function mostrarRespuestas() {
  tiempo = 10;
  const pregunta = preguntas[preguntaActual];

  let botones = "";
  pregunta.opciones.forEach(op => {
    botones += `<button onclick="responder('${op}')">${op}</button>`;
  });

  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>${pregunta.p}</h2>
      <img src="${pregunta.img}">
      ${botones}
      <p id="temporizador">⏱️ ${tiempo}</p>
    </div>
  `;

  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("temporizador").innerText = "⏱️ " + tiempo;

    if (tiempo <= 0) {
      clearInterval(intervalo);
      siguiente();
    }
  }, 1000);
}

function responder(respuesta) {
  clearInterval(intervalo);

  if (respuesta === preguntas[preguntaActual].correcta) {
    puntos++;
    alert("✅ Correcto");
  } else {
    alert("❌ Incorrecto");
  }

  siguiente();
}

function siguiente() {
  preguntaActual++;
  mostrarPregunta();
}

function terminar() {
  document.getElementById("juego").innerHTML = `
    <div class="tarjeta">
      <h2>🏁 Fin del juego</h2>
      <p>${jugador}, puntos: ${puntos}</p>
      <button onclick="iniciar()">Jugar otra vez</button>
    </div>
  `;
}

iniciar();
</script>

</body>
</html>
