<!DOCTYPE html>
<html>
<head>
  <title>Quiz Pro de Fútbol ⚽</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b6623, #1e90ff);
      color: white;
      text-align: center;
    }

    #game {
      margin-top: 50px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 20px black;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      color: black;
      transition: 0.3s;
    }

    button:hover {
      background: yellow;
      transform: scale(1.05);
    }

    #timer {
      font-size: 20px;
      color: yellow;
      margin-top: 10px;
    }

    #ranking {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>⚽ Quiz Pro de Fútbol</h1>

<div id="game"></div>
<div id="ranking"></div>

<script>
let jugador = "";
let puntos = 0;
let tiempo = 10;
let intervalo;
let preguntasUsadas = [];

let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

const preguntas = [
  { p: "¿Quién ganó el Mundial 2022?", opciones: ["Brasil", "Argentina", "Francia", "España"], correcta: "Argentina" },
  { p: "¿Dónde jugó Messi más años?", opciones: ["PSG", "Barcelona", "Inter Miami", "Argentina"], correcta: "Barcelona" },
  { p: "¿Cuántos jugadores hay en un equipo?", opciones: ["9", "10", "11", "12"], correcta: "11" },
  { p: "¿Quién es CR7?", opciones: ["Messi", "Mbappé", "Cristiano Ronaldo", "Neymar"], correcta: "Cristiano Ronaldo" },
  { p: "¿Qué país ganó el Mundial 2010?", opciones: ["Brasil", "España", "Alemania", "Italia"], correcta: "España" },
  { p: "¿Qué competición es la más importante de clubes?", opciones: ["Europa League", "Champions League", "Liga", "Copa"], correcta: "Champions League" },
  { p: "¿De qué país es Neymar?", opciones: ["Argentina", "Portugal", "Brasil", "Francia"], correcta: "Brasil" },
  { p: "¿Qué equipo es rival del Real Madrid?", opciones: ["Atlético", "Barcelona", "Valencia", "Sevilla"], correcta: "Barcelona" },
  { p: "¿Quién tiene más Balones de Oro?", opciones: ["Ronaldo", "Messi", "Pelé", "Maradona"], correcta: "Messi" },
  { p: "¿Cuántos minutos dura un partido?", opciones: ["80", "90", "100", "120"], correcta: "90" }
];

function iniciar() {
  document.getElementById("game").innerHTML = `
    <div class="card">
      <h2>Escribe tu nombre</h2>
      <input id="nombre">
      <br>
      <button onclick="empezar()">Jugar</button>
    </div>
  `;
  mostrarRanking();
}

function empezar() {
  jugador = document.getElementById("nombre").value;
  if (!jugador) return alert("Escribe tu nombre");

  puntos = 0;
  preguntasUsadas = [];
  siguientePregunta();
}

function siguientePregunta() {
  if (preguntasUsadas.length === 10) {
    terminarJuego();
    return;
  }

  tiempo = 10;

  let index;
  do {
    index = Math.floor(Math.random() * preguntas.length);
  } while (preguntasUsadas.includes(index));

  preguntasUsadas.push(index);
  const pregunta = preguntas[index];

  let botones = "";
  pregunta.opciones.forEach(op => {
    botones += `<button onclick="verificar('${op}')">${op}</button>`;
  });

  document.getElementById("game").innerHTML = `
    <div class="card">
      <h2>${jugador}</h2>
      <p>${pregunta.p}</p>
      ${botones}
      <p id="timer">⏱️ ${tiempo}</p>
    </div>
  `;

  intervalo = setInterval(() => {
    tiempo--;
    document.getElementById("timer").innerText = "⏱️ " + tiempo;

    if (tiempo <= 0) {
      clearInterval(intervalo);
      siguientePregunta();
    }
  }, 1000);

  window.correcta = pregunta.correcta;
}

function verificar(respuesta) {
  clearInterval(intervalo);

  if (respuesta === window.correcta) {
    puntos++;
  }

  siguientePregunta();
}

function terminarJuego() {
  ranking.push({ nombre: jugador, puntos });

  localStorage.setItem("ranking", JSON.stringify(ranking));

  document.getElementById("game").innerHTML = `
    <div class="card">
      <h2>🏁 Fin del juego</h2>
      <p>${jugador}, tu puntuación: ${puntos}/10</p>
      <button onclick="iniciar()">Jugar otra vez</button>
    </div>
  `;

  mostrarRanking();
}

function mostrarRanking() {
  let html = "<h2>🏆 Ranking</h2>";

  ranking
    .sort((a, b) => b.puntos - a.puntos)
    .slice(0, 5)
    .forEach(j => {
      html += `<p>${j.nombre}: ${j.puntos}</p>`;
    });

  document.getElementById("ranking").innerHTML = html;
}

iniciar();
</script>

</body>
</html>
